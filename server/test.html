<!DOCTYPE html>
<html>
<body>
    <script>
        const ws = new WebSocket('ws://localhost:5503');
        
        ws.onopen = () => console.log('✅ WebSocket подключен!');
        ws.onmessage = (event) => console.log('📨 Получено:', event.data);
        ws.onerror = (error) => console.log('❌ Ошибка:', error);
    </script>
</body>
</html>
