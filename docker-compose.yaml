services:
  db:
    image: postgres:16-alpine
    container_name: sca-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-system_control_alerts}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - sca-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-system_control_alerts}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${DATABASE_PORT:-5432}:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sca-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SERVER_IP: 0.0.0.0
      SERVER_PORT: 2255
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-system_control_alerts}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      WS_HEARTBEAT_DEVICES_INTERVAL: ${WS_HEARTBEAT_DEVICES_INTERVAL:-30000}
      RELAY_DEVICE_ID: ${RELAY_DEVICE_ID:-a41942b7-4f77-4b13-90d5-da88294125f1}
      RING_CHANNEL_ID: ${RING_CHANNEL_ID:-6}
    ports:
      - "${SERVER_PORT:-2255}:2255"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: sca-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      PORT: 3000
      API_TARGET: http://server:2255
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  sca-db-data:
