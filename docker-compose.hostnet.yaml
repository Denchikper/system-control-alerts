services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sca-server
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      SERVER_IP: 0.0.0.0
      SERVER_PORT: ${SERVER_PORT:-2255}
      DATABASE_HOST: ${DATABASE_HOST:-127.0.0.1}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-system_control_alerts}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      WS_HEARTBEAT_DEVICES_INTERVAL: ${WS_HEARTBEAT_DEVICES_INTERVAL:-30000}

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: sca-web
    restart: unless-stopped
    depends_on:
      - server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3000
      API_TARGET: http://host.docker.internal:${SERVER_PORT:-2255}
    ports:
      - "${WEB_PORT:-3000}:3000"
